<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>iCloud Photo Sorter</title>
    <link rel="stylesheet" href="css/style.css" />
    <script type="module" src="js/main.js"></script>
  </head>
  <body>
    <div class="login-container">
      <div class="login-card">
        <div class="apple-logo"></div>
        <h1>iCloud Photo Sorter</h1>
        <h2>Sign in with Apple ID</h2>
        <p id="status" class="status-message"></p>

        <div id="login-form">
          <input id="appleId" type="text" placeholder="Apple ID" />
          <input id="password" type="password" placeholder="Password" />
          <button id="loginBtn">Sign In</button>
        </div>

        <div id="2fa-form" style="display: none">
          <input id="2faCode" type="text" placeholder="Enter verification code" />
          <button id="verifyBtn">Verify</button>
          <button id="restartBtn" class="secondary-btn">Try Again</button>
        </div>

        <div class="disclaimer">
          ⚠️ Credential Disclaimer: Your credentials are sent to our server. This is a school
          project — use at your own risk.
        </div>
      </div>

      <div id="albums-view" style="display: none" class="albums-container">
        <h1>Browse and select your albums:</h1>
        <ul id="albums-list" class="albums-list"></ul>

        <div class="albums-footer">
          <button id="download-btn" disabled>Download Selected</button>
        </div>
      </div>
    </div>
  </body>
</html>
