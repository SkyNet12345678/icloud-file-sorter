<!DOCTYPE html>
<html lang="en">
  <head>
    <title>iCloud Login</title>
    <script defer src="js/login.js"></script>
  </head>
  <body>
    <h2>iCloud Login</h2>

    <div id="login-form">
      <input id="appleId" placeholder="Apple ID" /><br /><br />
      <input id="password" type="password" placeholder="Password" /><br /><br />
      <button id="loginBtn">Login</button>
    </div>

    <div id="2fa-form" style="display: none">
      <input id="2faCode" placeholder="2FA Code" /><br /><br />
      <button id="verifyBtn">Verify 2FA</button>
    </div>

    <p id="status"></p>
  </body>
</html>
