<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>iCloud Photo Sorter</title>
    <link rel="stylesheet" href="css/style.css" />
    <script type="module" src="js/main.js"></script>
  </head>
  <body>
    <div class="login-container">
      <div class="login-card">
        <div class="apple-logo"></div>
        <h1>iCloud Photo Sorter</h1>
        <h2>Sign in with Apple ID</h2>
        <p id="status" class="status-message"></p>
        <div id="login-form">
          <input id="appleId" type="text" placeholder="Apple ID" />
          <input id="password" type="password" placeholder="Password" />
          <button id="loginBtn">Sign In</button>
        </div>

        <div id="2fa-form" style="display: none">
          <input id="2faCode" type="text" placeholder="Enter verification code" />
          <button id="verifyBtn">Verify</button>
          <button id="restartBtn" class="secondary-btn">Try Again</button>
        </div>

        <div class="disclaimer">
          ⚠️ Credential Disclaimer: Your credentials are sent to our server. This is a school
          project — use at your own risk.
        </div>
      </div>

      <div id="albums-view" style="display: none" class="albums-container">
        <h1 style="text-align: center;">iCloud photo Sorter</h1>
        <p>Organize your iCloud photos into folders.</p>
        <p id="albums-status" class="status-message" hidden></p>
        <br>
        <h3>Select albums to organize:</h3>
        <ul id="albums-list" class="albums-list"></ul>

        <div class="albums-footer">
          <button id="test-fetch-btn" disabled>⬇ Test: Fetch album assets</button>
          <button id="download-btn" disabled>Sort photos to selected albums</button>
          <button id="cancel-btn" class="cancel-btn" hidden>Cancel sort</button>
          <div id="sort-progress" class="sort-progress">
            <div id="sort-selection" class="sort-selection">No albums selected</div>
            <div id="sort-progress-content" class="sort-progress-content" hidden>
              <div class="sort-progress-track">
                <div id="sort-progress-fill" class="sort-progress-fill"></div>
              </div>
              <div class="sort-progress-meta">
                <span id="sort-progress-percent" class="sort-progress-percent">0%</span>
                <span id="sort-progress-message" class="sort-progress-message"></span>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
