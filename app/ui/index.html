<!DOCTYPE html>
<html>
  <body>
    <h2>iCloud Login</h2>

    <div id="login-form">
      <input id="appleId" placeholder="Apple ID" /><br /><br />
      <input id="password" type="password" placeholder="Password" /><br /><br />
      <button onclick="login()">Login</button>
    </div>

    <div id="2fa-form" style="display: none">
      <input id="2faCode" placeholder="2FA Code" /><br /><br />
      <button onclick="submit2FA()">Verify 2FA</button>
    </div>

    <p id="status"></p>

    <script>
      async function login() {
        if (!window.pywebview || !window.pywebview.api) {
          console.log("Bridge not ready yet");
          return;
        }

        const appleId = document.getElementById("appleId").value;
        const password = document.getElementById("password").value;

        const result = await window.pywebview.api.login(appleId, password);
        console.log(result);

        if (result.success) {
          document.getElementById("status").innerText = "Logged in!";
          document.getElementById("login-form").style.display = "none";
        } else if (result["2fa_required"]) {
          document.getElementById("login-form").style.display = "none";
          document.getElementById("2fa-form").style.display = "block";
          document.getElementById("status").innerText = result.message;
        } else {
          document.getElementById("status").innerText = result.message;
        }
      }

      async function submit2FA() {
        const code = document.getElementById("2faCode").value;
        const result = await window.pywebview.api.verify_2fa(code);
        console.log(result);

        if (result.success) {
          document.getElementById("status").innerText = result.message || "Logged in!";
          document.getElementById("2fa-form").style.display = "none";
        } else {
          document.getElementById("status").innerText = result.message;
        }
      }
    </script>
  </body>
</html>
